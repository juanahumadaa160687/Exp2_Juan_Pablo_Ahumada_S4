<router-outlet>
  <app-navbar></app-navbar>
  <br>
    <main>
      <div class="container d-flex justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="p-4" id="registro_form" style="width: 100%;">
          <h2 class="mb-4">Registro de Usuarios</h2>

          <form id="signup_form" class="needs-validation row g-3" novalidate>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre">
                <label for="nombre" class="">Nombre</label>
                <div class="invalid-feedback" id="nombre_feedback">
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="apellido" name="apellido" placeholder="Apellido">
                <label for="apellido" class="">Apellido</label>
                <div class="invalid-feedback" id="apellidos_feedback">
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Username">
                <label for="username" class="">Username</label>
                <div class="invalid-feedback" id="username_feedback">
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Correo Electrónico" name="email">
                <label for="email" class="">Correo Electrónico</label>
                <div class="form-text">No compartiremos esta información con terceros.</div>
                <div class="invalid-feedback" id="email_feedback"></div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" placeholder="Fecha de nacimiento">
                <label for="fecha_nacimiento" class="">Fecha de Nacimiento</label>
                <div class="invalid-feedback" id="fecha_nacimiento_feedback">
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="direccion" placeholder="Dirección de despacho" name="direccion">
                <label for="direccion" class="">Dirección de Despacho</label>
                <div class="form-text">Opcional</div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="Contraseña" name="password">
                <label for="password" class="">Contraseña</label>
                <div class="form-text">La contraseña debe tener al menos 8 caracteres, mayúsculas, minúsculas, dígitos y caracteres especiales (@$!%*?&)</div>
                <div class="invalid-feedback" id="password_feedback">
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirma tu contraseña" name="confirmPassword">
                <label for="confirmPassword" class="">Confirmar Contraseña</label>
                <div class="invalid-feedback" id="confirmPassword_feedback">
                </div>
              </div>
            </div>

            <div class="form-floating col-md mb-3 visually-hidden" style="display: none;">
              <input type="text" value="usuario" class="form-control" id="role" name="role"> <!-- Rol de usuario oculto, se asigna automáticamente -->
              <label for="role" class="">Rol</label>
            </div>

            <div class="mb-3 col-md-6 d-flex justify-content-center">
              <button class="pt-2 pb-2 limpiar" type="reset">Limpiar</button>
            </div>
            <div class="mb-3 col-md-6 d-flex justify-content-center">
              <button class="pt-2 pb-2" type="submit" (click)="saveUser()">Registrarse</button>
            </div>
          </form>

        </div>
      </div>
    </main>
  <br>
  <app-footer></app-footer>
</router-outlet>
