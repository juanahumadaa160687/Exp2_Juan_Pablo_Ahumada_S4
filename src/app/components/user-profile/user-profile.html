<router-outlet>
  <app-navbar></app-navbar>
  <br>
  <main>
    <div class="container">
      <div class="row">

        <div class="container-fluid d-flex flex-column justify-content-center align-items-center">

          <div class="col-12 card d-flex">
            <div class="card-header d-flex align-items-center">
              <div class="col-4 d-flex align-items-center">
                <h4 class="card-title mb-0">{{nombre}} {{apellido}}</h4>
              </div>
              <div class="col-8 gap-1 d-flex align-items-center justify-content-end">
                <button class="btn btn-primary btn-sm" (click)="editProfile($event)" style="width: 20%"><i class="bi bi-pencil-square"></i> Editar</button>
                <button class="btn btn-secondary btn-sm" (click)="cambiarPassword($event)" style="width: 30%"><i class="bi bi-key"></i> Cambiar Password</button>
                <button class="btn btn-danger btn-sm" (click)="deleteProfile()" style="width: 20%"><i class="bi bi-trash-fill"></i> Eliminar</button>
              </div>
            </div>
            <div class="row d-flex align-items-center justify-content-center">
              <div class="col-3 d-flex align-items-center justify-content-center">
                <img ngSrc="/profile-pic/default_profile_pic.svg" class="img-fluid" alt="User Avatar" width="150" height="150">
              </div>
              <div class="col-9 d-flex justify-content-center align-items-center">
                <div class="card-body col">
                  <h5 class="card-text"><strong>Username</strong></h5>
                  <p class="card-text"><small>{{username}}</small></p>
                  <br>
                  <h5 class="card-text"><strong>Email</strong></h5>
                  <p class="card-text"><small>{{email}}</small></p>
                </div>
                <div class="card-body col">
                  <h5 class="card-text"><strong>Fecha de Nacimiento</strong></h5>
                  <p class="card-text"><small>{{fecha_nacimiento}}</small></p>
                  <br>
                  <h5 class="card-text"><strong>Dirección de Despacho</strong></h5>
                  <p class="card-text"><small>{{direccion}}</small></p>
                </div>
              </div>
            </div>
          </div>
          <br>
          <br>
          <div class="col-12 card d-flex" >
            <div class="card-header p-2">
              <h5 class="card-title mb-0">Mis Pedidos</h5>
            </div>
            <div class="card-body">
              <p class="card-text mb-0">Aquí puedes ver tus pedidos recientes y su estado.</p>
              <table class="display" id="tablaPedidos"></table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <br>
  <app-footer></app-footer>
</router-outlet>
