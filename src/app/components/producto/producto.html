<router-outlet>
  <app-navbar></app-navbar>
  <br>
    <main>

      <div class="container title p-1 mb-5 d-flex justify-content-start align-items-center">
        <h2 class="mb-0">{{ nombre_producto }}</h2>
      </div>
      <br>
      <div class="container row d-flex justify-content-center align-items-center flex-wrap gap-2">

        <div class="col d-flex justify-content-center align-items-center">
          <img ngSrc="/{{ imagen_producto }}" alt="Imagen de {{ nombre_producto }}" width="300" height="300" priority>
        </div>

        <div class="col d-flex justify-content-center align-items-center">
          <div class="card">
            <div class="card-body d-flex justify-content-center align-items-start flex-column">
              <h4 class="card-title">{{ nombre_producto }}</h4>
              <br>
              <p class="card-text">{{ descripcion_producto }}</p>
              <br>
              <p class="card-text"><strong>Precio:</strong> ${{ precio_producto }}</p>
              <br>
              <p class="card-text">Stock: {{ stock_producto }}</p>
              <br>
              <div class="col-md-12 d-flex justify-content-center align-items-center pt-3">
                <button class="pt-2 pb-2" (click)="agregarCarro(id_producto)"><i class="bi bi-cart4"></i> Comprar</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  <br>
  <app-footer></app-footer>
</router-outlet>
